version: '3.8'

services:
  agent-builder:
    build:
      context: .
      dockerfile: Dockerfile.crosscompile
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      APP_HOST: ${APP_HOST}
      APP_PORT: ${APP_PORT}
      APP_TITLE: ${APP_TITLE}
      APP_VERSION: ${APP_VERSION}
      DEBUG: ${DEBUG}
      CORS_ORIGINS: ${CORS_ORIGINS}
      SECRET_KEY: ${SECRET_KEY}
      FIRST_SUPERUSER: ${FIRST_SUPERUSER}
      FIRST_SUPERUSER_PASSWORD: ${FIRST_SUPERUSER_PASSWORD}
      LOG_DIR: ${LOG_DIR}
      UPLOAD_DIR: ${UPLOAD_DIR}
    volumes:
      - ./dist:/app/dist
    env_file:
      - .env
    networks:
      - sysdm_network
    command: python3 builder_cpp/build_agents.py

  db:
    image: postgres:15-alpine
    container_name: sysdm_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    networks:
      - sysdm_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  sysdm_network:
    driver: bridge
    name: sysdm_network

volumes:
  postgres_data:
    driver: local
