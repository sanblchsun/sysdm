<!-- app/templates/partials/rdp_dashboard.html -->
<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>Stream relay</title>
    <style>
      body {
        font-family: system-ui, Arial;
        background: #111;
        color: #eee;
        margin: 0;
        padding: 16px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 18px;
      }
      .grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(auto-fill, minmax(520px, 1fr));
      }
      .card {
        background: #1b1b1b;
        border: 1px solid #333;
        border-radius: 8px;
        overflow: hidden;
      }
      .card header {
        padding: 8px 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #222;
        font-size: 14px;
      }
      .card .media {
        display: block;
        background: #000;
        width: 100%;
        aspect-ratio: 16/9;
        object-fit: contain;
      }
      .card .ctrl {
        padding: 8px 12px;
        display: flex;
        gap: 6px;
        flex-wrap: nowrap;
        overflow-x: auto;
        font-size: 12px;
        background: #191919;
        border-top: 1px solid #2a2a2a;
        align-items: center;
      }
      .ctrl label {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        white-space: nowrap;
        min-width: 0;
        color: #bbb;
      }
      .ctrl select,
      .ctrl input,
      .ctrl button {
        background: #222;
        color: #eee;
        border: 1px solid #333;
        border-radius: 4px;
        padding: 4px 6px;
        font: inherit;
      }
      .ctrl select {
        max-width: 90px;
      }
      .ctrl input {
        width: 56px;
      }
      .ctrl input[name="mjpeg_q"],
      .ctrl input[name="fps"] {
        width: 44px;
      }
      .ctrl button {
        cursor: pointer;
        background: #2a3b2a;
        border-color: #3a5a3a;
        color: #e7ffe7;
        transition:
          transform 60ms ease,
          background 120ms ease,
          border-color 120ms ease;
        user-select: none;
        min-width: 84px;
        text-align: center;
      }
      .ctrl button:hover:not(:disabled) {
        background: #355535;
        border-color: #4a7a4a;
      }
      .ctrl button:active:not(:disabled) {
        background: #1e2d1e;
        border-color: #2c4a2c;
        transform: translateY(1px);
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.5);
      }
      .ctrl button.ok {
        background: #2e6b2e;
        border-color: #4aa04a;
      }
      .ctrl button.bad {
        background: #6b2e2e;
        border-color: #a04a4a;
      }
      .ctrl button:disabled {
        opacity: 0.6;
        cursor: default;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 6px;
        vertical-align: middle;
      }
      .ok {
        background: #3c3;
      }
      .off {
        background: #c33;
      }
      .stats {
        font-size: 12px;
        color: #aaa;
      }
      .tag {
        font: 11px monospace;
        color: #9cf;
        background: #1b2430;
        padding: 1px 6px;
        border-radius: 3px;
      }
      .empty {
        color: #888;
        padding: 40px;
        text-align: center;
        border: 1px dashed #444;
        border-radius: 8px;
      }
      .ph {
        aspect-ratio: 16/9;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        color: #6c9;
        font: 14px monospace;
      }
    </style>
  </head>
  <body>
    <h1>Агенты</h1>
    <div id="root">
      <div class="empty" id="empty">Нет подключённых агентов.</div>
    </div>

    <script>
      const cards = new Map();

      async function apiGet(u) {
        return (await fetch(u)).json();
      }
      async function apiPost(u, body) {
        const r = await fetch(u, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });

        function connectDashboardSync() {
          const protocol = location.protocol === "https:" ? "wss:" : "ws:";
          const ws = new WebSocket(
            `${protocol}//${location.host}/relay/ws/agent-config-sync`,
          );
          ws.onmessage = function (e) {
            try {
              const a = JSON.parse(e.data);
              const targetAgent = new URLSearchParams(location.search).get(
                "agent",
              );
              if (targetAgent && a.id !== targetAgent) return;
              const c = cards.get(a.id);
              if (c) {
                updateCard(c, a);
              }
            } catch (_) {}
          };
          ws.onclose = function () {
            setTimeout(connectDashboardSync, 3000);
          };
        }
        connectDashboardSync();
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      }

      function ensureGrid() {
        const e = document.getElementById("empty");
        if (e) e.remove();
        let g = document.getElementById("grid");
        if (!g) {
          g = document.createElement("div");
          g.className = "grid";
          g.id = "grid";
          document.getElementById("root").appendChild(g);
        }
        return g;
      }

      function makeCard(a) {
        const el = document.createElement("div");
        el.className = "card";
        el.innerHTML = `
    <header>
      <span><span class="dot"></span><b></b> <span class="tag"></span></span>
      <span class="stats"></span>
    </header>
    <a target="_blank"><img class="media" alt=""><canvas class="media" style="display:none"></canvas></a>
    <div class="ctrl">
      <label>codec
        <select name="codec">
          <option value="mjpeg">MJPEG</option>
          <option value="h264">H.264</option>
        </select>
      </label>
      <label data-role="h264-only">enc
        <select name="encoder">
          <option value="cpu"   title="libx264">CPU</option>
          <option value="amf"   title="h264_amf">AMD</option>
          <option value="qsv"   title="h264_qsv">Intel</option>
          <option value="nvenc" title="h264_nvenc">NVIDIA</option>
        </select>
      </label>
      <label data-role="h264-only">br <input name="bitrate" value="4M"></label>
      <label data-role="mjpeg-only">q <input name="mjpeg_q" value="4" type="number" min="2" max="31"></label>
      <label>fps <input name="fps" value="30" type="number" min="1" max="120"></label>
      <label title="Таймаут неактивности (мин)">timeout <input name="rdp_timeout" value="5" type="number" min="1" max="1440"></label>
      <button type="button">Применить</button>
    </div>`;
        const name = el.querySelector("b");
        const tag = el.querySelector(".tag");
        const dot = el.querySelector(".dot");
        const stats = el.querySelector(".stats");
        const img = el.querySelector("img");
        const canvas = el.querySelector("canvas");
        const link = el.querySelector("a");
        const btn = el.querySelector("button");
        const sel = (n) => el.querySelector(`[name=${n}]`);

        const applyCodecVisibility = () => {
          const h264 = sel("codec").value === "h264";
          el.querySelectorAll('[data-role="h264-only"]').forEach(
            (e) => (e.style.display = h264 ? "" : "none"),
          );
          el.querySelectorAll('[data-role="mjpeg-only"]').forEach(
            (e) => (e.style.display = h264 ? "none" : ""),
          );
        };
        sel("codec").addEventListener("change", applyCodecVisibility);
        applyCodecVisibility();

        let busy = false;
        btn.onclick = async () => {
          if (busy) return;
          busy = true;
          const original = btn.textContent;
          btn.disabled = true;
          btn.classList.remove("ok", "bad");
          btn.textContent = "…";
          const body = {
            codec: sel("codec").value,
            encoder: sel("encoder").value,
            bitrate: sel("bitrate").value,
            fps: parseInt(sel("fps").value, 10),
            mjpeg_q: parseInt(sel("mjpeg_q").value, 10),
            rdp_timeout: parseInt(sel("rdp_timeout").value, 10),
          };
          try {
            await apiPost(
              `/relay/agents/${encodeURIComponent(a.id)}/config`,
              body,
            );
            btn.textContent = "✓ применено";
            btn.classList.add("ok");
          } catch (e) {
            btn.textContent = "✗ ошибка";
            btn.classList.add("bad");
          }
          setTimeout(() => {
            btn.textContent = original;
            btn.classList.remove("ok", "bad");
            btn.disabled = false;
            busy = false;
          }, 900);
        };

        return {
          el,
          name,
          tag,
          dot,
          stats,
          img,
          canvas,
          link,
          sel,
          applyCodecVisibility,
          lastFrames: 0,
          lastTime: Date.now(),
          lastSrc: "",
          placeholder: null,
          h264Ws: null,
          h264Decoder: null,
          h264Buf: null,
          h264Pos: 0,
          h264Base: 0,
          h264WaitingKey: true,
          h264InitInFlight: false,
          h264Started: false,
          btn,
        };
      }

      function updateCard(c, a) {
        c.name.textContent = a.id;
        c.dot.className = "dot " + (a.alive ? "ok" : "off");
        const cur = a.current || {};
        c.tag.textContent =
          (cur.codec || "?") +
          (cur.encoder ? "/" + cur.encoder : "") +
          (a.ctrl_connected ? " 🖱" : "");
        c.link.href = `/rdp/viewer?id=${encodeURIComponent(a.id)}`;

        const wantSrc =
          cur.codec === "h264"
            ? `__h264__`
            : `/relay/stream/mjpeg/${encodeURIComponent(a.id)}`;
        if (c.lastSrc !== wantSrc) {
          if (cur.codec === "h264") {
            c.img.removeAttribute("src");
            c.img.style.display = "none";
            c.canvas.style.display = "";
            if (c.placeholder) {
              c.placeholder.remove();
              c.placeholder = null;
            }
            if (!("VideoDecoder" in window)) {
              if (!c.placeholder) {
                c.placeholder = document.createElement("div");
                c.placeholder.className = "ph";
                c.placeholder.textContent = "H.264 → клик для просмотра";
                c.canvas.parentNode.appendChild(c.placeholder);
              }
              c.canvas.style.display = "none";
            } else {
              startH264Card(c, a.id);
            }
          } else {
            stopH264Card(c);
            c.canvas.style.display = "none";
            if (c.placeholder) {
              c.placeholder.remove();
              c.placeholder = null;
            }
            c.img.style.display = "";
            c.img.src = wantSrc + `?t=${Date.now()}`;
          }
          c.lastSrc = wantSrc;
        }

        const t = a.target || {};
        const focusedHere =
          document.activeElement &&
          document.activeElement.closest(".card") === c.el;
        if (!focusedHere && !c.btn.disabled) {
          c.sel("codec").value = t.codec || "h264";
          c.sel("encoder").value = t.encoder || "cpu";
          c.sel("bitrate").value = t.bitrate || "4M";
          c.sel("fps").value = t.fps || 30;
          c.sel("mjpeg_q").value = t.mjpeg_q || 4;
          c.sel("rdp_timeout").value =
            t.rdp_timeout != null ? t.rdp_timeout : 5;
          c.applyCodecVisibility();
        }

        const dt = (Date.now() - c.lastTime) / 1000;
        const total = (a.mjpeg_frames || 0) + (a.h264_keyframes || 0);
        const df = total - c.lastFrames;
        const rate = dt > 0 ? (df / dt).toFixed(1) : "0.0";
        c.lastFrames = total;
        c.lastTime = Date.now();
        c.stats.textContent = `${rate}/s · uptime ${a.uptime_s}s`;
      }

      // ========= H.264 via WebCodecs (встроенный просмотр в карточке) =========
      function nalType(b) { return b & 0x1f; }

      function findStartCodes(data) {
        const out = [];
        let i = 0, n = data.length;
        while (i + 3 < n) {
          if (data[i] === 0 && data[i + 1] === 0) {
            if (data[i + 2] === 1) {
              out.push({ pos: i, len: 3 }); i += 3; continue;
            }
            if (i + 3 < n && data[i + 2] === 0 && data[i + 3] === 1) {
              out.push({ pos: i, len: 4 }); i += 4; continue;
            }
          }
          i++;
        }
        return out;
      }

      function findNALU(au, type) {
        const cs = findStartCodes(au);
        for (const c of cs)
          if (nalType(au[c.pos + c.len]) === type) return c.pos + c.len;
        return -1;
      }

      function codecStringFromSPS(au) {
        const off = findNALU(au, 7);
        if (off < 0) return "avc1.42E01E";
        const h = (x) => x.toString(16).padStart(2, "0").toUpperCase();
        return `avc1.${h(au[off + 1])}${h(au[off + 2])}${h(au[off + 3])}`;
      }

      async function pickDecoderConfig(codec) {
        const candidates = [
          { codec, hardwareAcceleration: "prefer-hardware", optimizeForLatency: true },
          { codec, hardwareAcceleration: "prefer-hardware" },
          { codec, optimizeForLatency: true },
          { codec },
          { codec, hardwareAcceleration: "prefer-software", optimizeForLatency: true },
          { codec, hardwareAcceleration: "prefer-software" },
        ];
        for (const cfg of candidates) {
          try {
            const res = await VideoDecoder.isConfigSupported(cfg);
            if (res && res.supported) return res.config || cfg;
          } catch {}
        }
        return null;
      }

      function resetH264Decoder(c) {
        if (c.h264Decoder) {
          try { c.h264Decoder.close(); } catch {}
          c.h264Decoder = null;
        }
        c.h264WaitingKey = true;
        c.h264InitInFlight = false;
      }

      async function initH264Decoder(c, keyAUCopy) {
        c.h264InitInFlight = true;
        const codec = codecStringFromSPS(keyAUCopy);
        try {
          const cfg = await pickDecoderConfig(codec);
          if (!cfg) { c.h264InitInFlight = false; return; }
          const dec = new VideoDecoder({
            output: (frame) => {
              if (c.canvas.width !== frame.displayWidth) {
                c.canvas.width = frame.displayWidth;
                c.canvas.height = frame.displayHeight;
              }
              const ctx = c.canvas.getContext("2d");
              if (ctx) ctx.drawImage(frame, 0, 0);
              frame.close();
            },
            error: () => resetH264Decoder(c),
          });
          dec.configure(cfg);
          c.h264Decoder = dec;
          c.h264WaitingKey = false;
          try {
            dec.decode(new EncodedVideoChunk({
              type: "key",
              timestamp: performance.now() * 1000,
              data: keyAUCopy,
            }));
          } catch { resetH264Decoder(c); }
        } catch { resetH264Decoder(c); }
        finally { c.h264InitInFlight = false; }
      }

      function handleH264AU(c, au) {
        const hasIDR = findNALU(au, 5) >= 0;
        const hasP = findNALU(au, 1) >= 0;
        if (!hasIDR && !hasP) return;
        const isKey = hasIDR;
        if (!c.h264Decoder) {
          if (!isKey || c.h264InitInFlight) return;
          initH264Decoder(c, new Uint8Array(au));
          return;
        }
        if (c.h264Decoder.state !== "configured") return;
        if (c.h264WaitingKey) {
          if (!isKey) return;
          c.h264WaitingKey = false;
        }
        try {
          c.h264Decoder.decode(new EncodedVideoChunk({
            type: isKey ? "key" : "delta",
            timestamp: performance.now() * 1000,
            data: au,
          }));
        } catch { resetH264Decoder(c); }
      }

      function drainH264AUs(c) {
        const len = c.h264Pos - c.h264Base;
        if (len < 8) return;
        const data = c.h264Buf.subarray(c.h264Base, c.h264Pos);
        const codes = findStartCodes(data);
        if (codes.length < 2) return;
        const boundaries = [];
        const hasAUD = codes.some(cc => nalType(data[cc.pos + cc.len]) === 9);
        if (hasAUD) {
          for (let k = 0; k < codes.length; k++) {
            const cc = codes[k];
            const t = nalType(data[cc.pos + cc.len]);
            if (t === 9) boundaries.push(cc.pos);
            else if (t === 7 && boundaries.length === 0) boundaries.push(cc.pos);
          }
        } else {
          for (let k = 0; k < codes.length; k++) {
            const cc = codes[k];
            const t = nalType(data[cc.pos + cc.len]);
            if (t === 1) boundaries.push(cc.pos);
          }
          if (boundaries.length === 0) return;
          if (boundaries[0] !== 0) boundaries.unshift(0);
        }
        if (boundaries.length < 2) return;
        for (let i = 0; i < boundaries.length - 1; i++) {
          handleH264AU(c, data.subarray(boundaries[i], boundaries[i + 1]));
        }
        c.h264Base += boundaries[boundaries.length - 1];
        if (c.h264Base > c.h264Buf.length / 2) {
          const remaining = c.h264Pos - c.h264Base;
          c.h264Buf.copyWithin(0, c.h264Base, c.h264Pos);
          c.h264Pos = remaining;
          c.h264Base = 0;
        }
      }

      function startH264Card(c, aid) {
        if (c.h264Started) return;
        if (!("VideoDecoder" in window)) return;
        const BUF_SIZE = 2 * 1024 * 1024;
        c.h264Buf = new Uint8Array(BUF_SIZE);
        c.h264Pos = 0;
        c.h264Base = 0;
        c.h264WaitingKey = true;
        c.h264InitInFlight = false;
        const proto = location.protocol === "https:" ? "wss:" : "ws:";
        c.h264Ws = new WebSocket(
          `${proto}//${location.host}/relay/ws/stream/h264/${encodeURIComponent(aid)}`
        );
        c.h264Ws.binaryType = "arraybuffer";
        c.h264Ws.onmessage = (ev) => {
          const add = new Uint8Array(ev.data);
          if (add.length === 0) return;
          if (c.h264Pos + add.length > c.h264Buf.length) {
            if (c.h264Base > 0) {
              const remaining = c.h264Pos - c.h264Base;
              c.h264Buf.copyWithin(0, c.h264Base, c.h264Pos);
              c.h264Pos = remaining;
              c.h264Base = 0;
            }
            if (c.h264Pos + add.length > c.h264Buf.length) {
              const newSize = Math.max(c.h264Buf.length * 2, c.h264Pos + add.length);
              const newBuf = new Uint8Array(newSize);
              newBuf.set(c.h264Buf.subarray(0, c.h264Pos), 0);
              c.h264Buf = newBuf;
            }
          }
          c.h264Buf.set(add, c.h264Pos);
          c.h264Pos += add.length;
          drainH264AUs(c);
        };
        c.h264Ws.onerror = () => {};
        c.h264Ws.onclose = () => {};
        c.h264Started = true;
      }

      function stopH264Card(c) {
        c.h264Started = false;
        if (c.h264Decoder) {
          try { c.h264Decoder.close(); } catch {}
          c.h264Decoder = null;
        }
        if (c.h264Ws) {
          try { c.h264Ws.close(); } catch {}
          c.h264Ws = null;
        }
        c.h264Buf = null;
        c.h264Pos = 0;
        c.h264Base = 0;
        c.h264WaitingKey = true;
        c.h264InitInFlight = false;
      }

      async function refresh() {
        let data;
        try {
          data = await apiGet("/relay/agents");
        } catch {
          return;
        }

        // Показываем только живых агентов (или одного конкретного, если передан ?agent=)
        const targetAgent = new URLSearchParams(location.search).get("agent");
        const filteredAgents = targetAgent
          ? data.agents.filter((a) => a.id === targetAgent && a.alive)
          : data.agents.filter((a) => a.alive);

        const grid = filteredAgents.length ? ensureGrid() : null;
        const ids = new Set(filteredAgents.map((a) => a.id));
        for (const [id, c] of cards) {
          if (!ids.has(id)) {
            stopH264Card(c);
            c.el.remove();
            cards.delete(id);
          }
        }
        if (!filteredAgents.length) {
          if (!document.getElementById("empty")) {
            document.getElementById("root").innerHTML =
              '<div class="empty" id="empty">Нет подключённых агентов.</div>';
          }
          return;
        }
        for (const a of filteredAgents) {
          let c = cards.get(a.id);
          if (!c) {
            c = makeCard(a);
            grid.appendChild(c.el);
            cards.set(a.id, c);
          }
          updateCard(c, a);
        }
      }
      refresh();
      setInterval(refresh, 30000);

      // ========= DASHBOARD AVAILABILITY MONITORING =========
      const agentUuid = new URLSearchParams(location.search).get("agent");

      if (agentUuid) {
        // Register with server — server will start monitoring dashboard availability
        fetch("/api/agent/watch-agent?uuid=" + encodeURIComponent(agentUuid), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: "{}",
        });

        // Open SSE connection so server can detect when this tab closes
        new EventSource(
          "/api/agent/dashboard-monitor?uuid=" + encodeURIComponent(agentUuid)
        );
      }
    </script>
  </body>
</html>
